services:
  - type: web
    name: max-cfo-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ASAAS_API_KEY
        sync: false
      - key: FOCUS_NFE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
